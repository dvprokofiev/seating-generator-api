name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.x", "stable"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod tidy
        # Optional: you can cache dependencies for faster subsequent runs
        # uses: actions/cache@v3
        # with:
        #   path: ~/go/pkg/mod
        #   key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        #   restore-keys: |
        #     ${{ runner.os }}-go-

      - name: Build
        run: go build -v ./...

      - name: Test with Go CLI
        run: go test -v ./...
